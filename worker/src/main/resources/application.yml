server:
  port: 8400

spring:
  application:
    name: service-worker
  data:
    redis:
      timeout: 10000ms
      cluster:
        max-redirects: 3
        nodes:
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_1:127.0.0.1:7001}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_2:127.0.0.1:7002}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_3:127.0.0.1:7003}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_4:127.0.0.1:7004}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_5:127.0.0.1:7005}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_6:127.0.0.1:7006}
      lettuce:
        cluster:
          refresh:
            adaptive: true
            period: 30s

schedulejob:
  worker:
    heartbeat-interval-ms: 1000
    execute-delay-min-ms: 5
    execute-delay-max-ms: 10
    success-rate: 1.0
    callback-max-attempts: 3
    callback-retry-delay-ms: 300
    scheduler-callback-base-url: ${SCHEDULEJOB_WORKER_SCHEDULER_CALLBACK_BASE_URL:${SCHEDULEJOB_WORKER_SCHEDULER_MQ_BASE_URL:${SCHEDULEJOB_WORKER_SCHEDULER_GATEWAY_BASE_URL:}}}
    host: ${SCHEDULEJOB_WORKER_HOST:127.0.0.1:8400}
    max-load: ${SCHEDULEJOB_WORKER_MAX_LOAD:100000}
    executor-core-pool-size: 200
    executor-max-pool-size: 400
    executor-queue-capacity: 100000
    http-connect-timeout-ms: ${SCHEDULEJOB_WORKER_HTTP_CONNECT_TIMEOUT_MS:2000}
    http-read-timeout-ms: ${SCHEDULEJOB_WORKER_HTTP_READ_TIMEOUT_MS:5000}
