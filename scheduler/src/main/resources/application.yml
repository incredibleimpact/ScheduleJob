server:
  port: 8300

spring:
  application:
    name: service-scheduler
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/schedule_job?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      timeout: 10000ms
      cluster:
        max-redirects: 3
        nodes:
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_1:127.0.0.1:7001}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_2:127.0.0.1:7002}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_3:127.0.0.1:7003}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_4:127.0.0.1:7004}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_5:127.0.0.1:7005}
          - ${SCHEDULEJOB_REDIS_CLUSTER_NODE_6:127.0.0.1:7006}
      lettuce:
        cluster:
          refresh:
            adaptive: true
            period: 30s

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: schedulejob.scheduler.domain

schedulejob:
  scheduler:
    shard-count: 128
    instance-id: ${SCHEDULEJOB_INSTANCE_ID:}
    preheat-minutes: 20
    scan-batch-size: 20000
    claim-batch-size: 4000
    dispatch-core-pool-size: 128
    dispatch-max-pool-size: 256
    dispatch-queue-capacity: 100000
    retry-delay-seconds: 3
    claim-timeout-ms: 60000
    executor-heartbeat-timeout-ms: 6000
    member-ttl-ms: 6000
    member-heartbeat-interval-ms: 2000
    lease-ttl-ms: 6000
    lease-renew-interval-ms: 2000
    recover-interval-ms: 2000
    dispatch-interval-ms: 20
    command-stream-key: ${SCHEDULEJOB_MQ_STREAM_KEY:schedulejob:stream:commands}
    command-consumer-group: ${SCHEDULEJOB_SCHEDULER_COMMAND_CONSUMER_GROUP:schedulejob-scheduler}
    command-consumer-thread-count: ${SCHEDULEJOB_SCHEDULER_COMMAND_CONSUMER_THREAD_COUNT:32}
    command-read-batch-size: ${SCHEDULEJOB_SCHEDULER_COMMAND_READ_BATCH_SIZE:1000}
    command-read-block-timeout-ms: ${SCHEDULEJOB_SCHEDULER_COMMAND_READ_BLOCK_TIMEOUT_MS:100}
    http-connect-timeout-ms: ${SCHEDULEJOB_SCHEDULER_HTTP_CONNECT_TIMEOUT_MS:2000}
    http-read-timeout-ms: ${SCHEDULEJOB_SCHEDULER_HTTP_READ_TIMEOUT_MS:5000}
    benchmark-no-worker-mode: true
    benchmark-executor-host: benchmark-local
